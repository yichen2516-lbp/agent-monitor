<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta http-equiv="Cache-Control" content="no-store">
  <meta name="theme-color" content="#040507">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Agent Monitor">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Agent Monitor">
  <meta name="description" content="Realtime monitoring dashboard for OpenClaw agents.">
  <link rel="manifest" href="/public/manifest.webmanifest">
  <link rel="icon" href="/public/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/public/icons/apple-touch-icon-180.png">
  <title>Agent Monitor v1.4 - OpenClaw Live Status</title>
  <!-- v1.4: session-first live status refinement -->
    <link rel="stylesheet" href="/public/monitor.css?v=20260314-pwa1">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-code" id="bg-code"></div>
  <div class="bg-vig"></div>

  <div class="container hud-grid">
    <aside class="hud-left">
      <section class="hud-panel">
        <div class="header">
          <div class="status-dot" id="connection-dot"></div>
          <h1>⚡ Agent Monitor</h1>
          <div class="connection-pill" id="connection-pill">CONNECTING</div>
          <div class="nav-links">
            <a href="/workspace">📂 Workspace</a>
            <button type="button" class="nav-action-btn" id="install-app-btn">⬇︎ Install App</button>
          </div>
          <div class="agents-list" id="agents-list"></div>
        </div>
      </section>

      <section class="hud-panel">
        <!-- 系统监控面板 -->
        <div class="system-panel" id="system-panel">
          <div class="system-item">
            <span class="system-label">CPU:</span>
            <span class="system-value-inline" id="cpu-value">--</span>
          </div>
          <div class="system-item">
            <span class="system-label">GPU:</span>
            <span class="system-value-inline" id="gpu-value">--</span>
          </div>
          <div class="system-item">
            <span class="system-label">MEM:</span>
            <span class="system-value-inline" id="mem-value">--</span>
          </div>
          <div class="system-item">
            <span class="system-label">DISK:</span>
            <span class="system-value-inline" id="disk-value">--</span>
          </div>
        </div>
      </section>

      <section class="hud-panel">
        <div class="panel-mini-title">Agent Live Status</div>
        <div class="agent-status-list" id="agent-status-list">
          <div class="empty">Waiting for live status...</div>
        </div>
      </section>

      <section class="hud-panel metrics-panel">
        <div class="summary-cards">
          <div class="summary-card" id="metric-card-active-sessions">
            <div class="label">Active Sessions</div>
            <div class="value" id="metric-active-sessions">--</div>
          </div>
          <div class="summary-card summary-card-clickable" id="metric-card-errors-5m" title="Click to filter errors only">
            <div class="label">Errors / 5m</div>
            <div class="value" id="metric-errors-5m">--</div>
          </div>
          <div class="summary-card summary-card-clickable" id="metric-card-slow-calls" title="Click to filter slow calls">
            <div class="label">Slow Calls (>3s)</div>
            <div class="value" id="metric-slow-calls">--</div>
          </div>
          <div class="summary-card" id="metric-card-visible">
            <div class="label">Visible Items</div>
            <div class="value" id="metric-visible">--</div>
          </div>
        </div>
      </section>
    </aside>

    <main class="hud-right">
      <section class="hud-panel hud-feed">
        <div class="feed-title">* REALTIME ACTIVITY FEED <span class="cursor"></span></div>
        <div id="session-focus-bar" class="session-focus-bar">
          <span class="session-focus-prefix">SESSION FOCUS</span>
          <span id="session-focus-label" class="session-focus-label"></span>
          <button id="session-focus-clear" class="session-focus-clear" type="button">Clear</button>
        </div>

        <div class="filters">
          <select id="filter-agent" class="filter-select">
            <option value="all">All Agents</option>
          </select>
          <select id="filter-type" class="filter-select">
            <option value="all">All Types</option>
            <option value="tool">tool</option>
            <option value="reply">reply</option>
            <option value="thinking">thinking</option>
            <option value="cron">cron</option>
          </select>
          <input id="filter-keyword" class="filter-input" placeholder="Search keyword (description / tool / session)" />
          <label class="filter-check">
            <input type="checkbox" id="filter-errors-only" />
            Errors Only
          </label>
          <button id="toggle-error-aggregate" class="quick-btn">Error Aggregate: Off</button>
          <button id="quick-failed-tools" class="quick-btn">Failed Tools</button>
          <button id="quick-tool-errors" class="quick-btn">Tool Errors</button>
          <button id="quick-cron-errors" class="quick-btn">Cron Errors</button>
          <button id="quick-reset-filters" class="quick-btn">Reset Filters</button>
        </div>

        <div id="activity-list" class="activity-list">
          <div class="empty">Loading...</div>
        </div>
        <div class="feed-footer-actions">
          <button id="feed-load-more" class="quick-btn" type="button" hidden>Load More</button>
        </div>
      </section>
    </main>
  </div>

    <script src="/public/modules/monitor-state.js?v=20260313-2015"></script>
    <script src="/public/modules/monitor-formatters.js?v=20260313-2015"></script>
    <script src="/public/modules/monitor-dom.js?v=20260313-2015"></script>
    <script src="/public/modules/monitor-ui-state.js?v=20260313-2015"></script>
    <script src="/public/modules/monitor-filters.js?v=20260313-2015"></script>
    <script src="/public/modules/monitor-system-panel.js?v=20260313-2015"></script>
    <script src="/public/modules/monitor-render.js?v=20260313-2015"></script>
    <script src="/public/modules/monitor-poller.js?v=20260314-pwa1"></script>
    <script src="/public/pwa.js?v=20260314-pwa1"></script>
    <script src="/public/monitor.js?v=20260314-pwa1"></script>

  <div id="drawer-overlay" class="drawer-overlay"></div>
  <aside id="detail-drawer" class="detail-drawer">
    <div class="detail-header">
      <span>Event Details</span>
      <button id="detail-close" class="detail-close">Close</button>
    </div>
    <div id="detail-body" class="detail-body">Click any event to view details</div>
  </aside>
</body>
</html>
